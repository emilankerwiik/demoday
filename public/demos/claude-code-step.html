<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Claude — mini demo</title>
<style>
:root{
  --bg:#2c2b28;
  --bg-sidebar:#292825;
  --bg-card:#35342f;
  --border:#3d3c37;
  --text:#e8e4db;
  --muted:#a09d93;
  --faint:#6b6860;
  --brand:#d97757;
  --brand-dim:rgba(217,119,87,.1);
  --font:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:"JetBrains Mono","SF Mono",ui-monospace,Menlo,Consolas,monospace
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}

/* layout */
.shell{display:flex;height:100vh}
.sidebar{
  width:48px;min-width:48px;flex-shrink:0;
  background:var(--bg-sidebar);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .2s ease,min-width .2s ease
}
.sidebar:hover{width:220px;min-width:220px;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* sidebar */
.sidebar-logo{
  padding:12px;display:flex;align-items:center;
  gap:10px;font-size:15px;font-weight:600;letter-spacing:-.01em;
  white-space:nowrap;overflow:hidden
}
.sidebar:hover .sidebar-logo{padding:16px 16px 12px}
.logo-icon{
  width:24px;height:24px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#d97757,#c4643f);
  display:flex;align-items:center;justify-content:center
}
.logo-icon svg{width:14px;height:14px}
.sidebar-section{padding:4px 8px;margin-bottom:4px}
.sidebar:hover .sidebar-section{padding:4px 12px}
.section-label{
  font-size:11px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--faint);padding:8px 8px 6px;font-weight:500;
  white-space:nowrap;overflow:hidden;
  opacity:0;transition:opacity .15s ease
}
.sidebar:hover .section-label{opacity:1}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:7px 10px;
  border-radius:6px;color:var(--muted);font-size:13px;
  cursor:pointer;transition:all .12s;user-select:none;
  white-space:nowrap;overflow:hidden
}
.nav-item:hover{background:var(--bg-card);color:var(--text)}
.nav-item.active{background:var(--brand-dim);color:var(--brand)}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.6}
.nav-item.active svg{opacity:1}
.nav-divider{height:1px;background:var(--border);margin:8px 12px}
.recent-item{
  display:flex;align-items:center;gap:8px;padding:5px 10px;
  border-radius:5px;color:var(--muted);font-size:12px;
  cursor:pointer;white-space:nowrap;overflow:hidden;
  opacity:0;transition:opacity .15s ease
}
.sidebar:hover .recent-item{opacity:1}
.recent-item:hover{background:var(--bg-card);color:var(--text)}

/* chat area */
.chat{flex:1;overflow-y:auto;padding:24px 32px;display:flex;flex-direction:column;gap:20px}
.msg{max-width:80%}
.msg-user{
  align-self:flex-end;background:var(--bg-card);
  border:1px solid var(--border);border-radius:16px 16px 4px 16px;
  padding:14px 18px;font-size:14px;line-height:1.55
}
.msg-ai{align-self:flex-start;display:flex;gap:10px}
.msg-ai-avatar{
  width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,#d97757,#c4643f);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px
}
.msg-ai-avatar svg{width:14px;height:14px}
.msg-ai-body{font-size:14px;line-height:1.6;color:var(--text)}
.msg-ai-body p{margin:0 0 8px}
.msg-ai-body p:last-child{margin:0}
.msg-ai-body code{
  font-family:var(--mono);font-size:12px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:4px;
  padding:2px 6px;color:var(--brand)
}
.code-block{
  background:#1e1d1a;border:1px solid var(--border);border-radius:8px;
  padding:14px 16px;font-family:var(--mono);font-size:12.5px;
  line-height:1.7;margin:8px 0;overflow-x:auto;color:var(--text)
}
.code-block .kw{color:#c084fc}
.code-block .str{color:#fbbf24}
.code-block .fn{color:#7eb8da}
.code-block .cmt{color:var(--faint)}
.msg-ai-body ul{margin:6px 0;padding-left:20px}
.msg-ai-body li{margin:3px 0;color:var(--muted);font-size:13px}
.artifact{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:8px;padding:12px 16px;margin:8px 0;cursor:pointer
}
.artifact-label{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--brand);font-weight:600;margin-bottom:4px}
.artifact-title{font-size:14px;font-weight:500}
.artifact-meta{font-size:11px;color:var(--faint);margin-top:3px}
.thinking{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--faint);font-style:italic;padding:4px 0}
.thinking-dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--brand);animation:blink 1.4s infinite;opacity:.3}
.thinking-dots span:nth-child(2){animation-delay:.2s}
.thinking-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{50%{opacity:1}}

/* input bar */
.input-bar{padding:12px 24px 16px;display:flex;align-items:center;gap:10px}
.input-field{
  flex:1;background:var(--bg-card);border:1px solid var(--border);
  border-radius:12px;padding:12px 18px;font-size:14px;
  color:var(--text);font-family:var(--font);outline:none;resize:none
}
.input-field::placeholder{color:var(--faint)}
.send-btn{
  width:36px;height:36px;border-radius:50%;background:var(--brand);
  border:0;color:#fff;display:flex;align-items:center;
  justify-content:center;cursor:pointer;flex-shrink:0
}
.send-btn svg{width:16px;height:16px}

</style>
</head>
<body>

    </div>
  </div>
</div>

  step3:'<div class="msg msg-user">Build me a React dashboard component with a sidebar, metric cards, and a data table. Use Tailwind CSS.</div><div class="msg msg-ai">'+avatar+'<div class="msg-ai-body"><p>Here is the full dashboard with sidebar, metrics, and table:</p><div class="artifact"><div class="artifact-label">Artifact</div><div class="artifact-title">Dashboard.tsx</div><div class="artifact-meta">React component &middot; 124 lines</div></div><p>The component includes:</p><ul><li>Collapsible sidebar with navigation icons</li><li>4 metric cards showing revenue, users, orders, and conversion rate</li><li>Sortable data table with pagination</li><li>Responsive layout using Tailwind <code>flex</code> and <code>grid</code></li></ul><p>You can drop this directly into your <code>app/dashboard/page.tsx</code>.</p></div></div>'

var current="chat";
var currentStep=1;
var chatEl=document.getElementById("chat");
var navItems=document.querySelectorAll(".nav-item");
function render(){
  var c=conversations[current];
  chatEl.innerHTML=c?c["step"+currentStep]||c.step1:"";
  navItems.forEach(function(n){n.classList.toggle("active",n.dataset.v===current)});
}
navItems.forEach(function(n){
  n.addEventListener("click",function(){current=n.dataset.v;render()});
});
var stepMap={1:"chat",2:"chat",3:"chat"};
function applyStep(s){currentStep=s;current=stepMap[s]||"chat";render()}
applyStep(parseInt(new URLSearchParams(location.search).get("step")||"1",10));
window.addEventListener("message",function(e){
  if(e&&e.data&&e.data.type==="setStep"){var s=Number(e.data.step);if(s>=1&&s<=3)applyStep(s)}
});
</script>
